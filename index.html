
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Chess</title>

<!-- Chessboard CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>

<body>

<h1>Simple Web Chess</h1>

<div id="board"></div>

<p id="status"></p>

<!-- jQuery (MUST FIRST) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Chess.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<!-- Chessboard.js -->
<script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>

var board = null;
var game = new Chess();

/* Update status */
function updateStatus() {
let status = '';
let moveColor = game.turn() === 'w' ? 'White' : 'Black';

if (game.in_checkmate()) {
status = 'Game over, ' + moveColor + ' is in checkmate.';
} else if (game.in_draw()) {
status = 'Game over, drawn position';
} else {
status = moveColor + ' to move';
if (game.in_check()) {
status += ' (in check)';
}
}

document.getElementById('status').innerHTML = status;
}

/* Drag start */
function onDragStart(source, piece) {
if (game.game_over()) return false;

if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
(game.turn() === 'b' && piece.search(/^w/) !== -1)) {
return false;
}
}

/* Drop piece */
function onDrop(source, target) {

let move = game.move({
from: source,
to: target,
promotion: 'q'
});

if (move === null) return 'snapback';

updateStatus();
}

/* Snap */
function onSnapEnd() {
board.position(game.fen());
}

/* Init AFTER everything loads */
window.onload = function(){

var config = {
draggable: true,
position: 'start',
onDragStart: onDragStart,
onDrop: onDrop,
onSnapEnd: onSnapEnd
};

board = Chessboard('board', config);
updateStatus();

};

</script>

</body>
